<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Vision — Аквариум</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #020e1a; }
  canvas { display: block; }

  /* HUD */
  #hud {
    position: fixed; top: 14px; left: 14px;
    color: rgba(200,240,255,0.85); font-size: 13px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: rgba(0,10,30,0.5); backdrop-filter: blur(8px);
    padding: 10px 16px; border-radius: 12px;
    border: 1px solid rgba(100,200,255,0.2);
    line-height: 1.7; pointer-events: none;
  }
  #hud b { color: #ffd166; }
  #dot {
    display: inline-block; width: 8px; height: 8px;
    border-radius: 50%; background: #555; margin-right: 6px;
    vertical-align: middle; transition: background 0.4s;
  }
  #dot.on  { background: #06d6a0; box-shadow: 0 0 8px #06d6a0; }
  #dot.off { background: #e63946; }

  /* Новая рыба — баннер */
  #banner {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(6,214,160,0.15); backdrop-filter: blur(10px);
    border: 1px solid rgba(6,214,160,0.4);
    color: #06d6a0; font-size: 16px; font-weight: 600;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 12px 28px; border-radius: 30px;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none; white-space: nowrap;
  }
  #banner.show { opacity: 1; }

  /* Подсказка кормления */
  #feedhint {
    position: fixed; bottom: 14px; right: 16px;
    color: rgba(10,40,55,0.6); font-size: 12px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    text-shadow: 0 1px 2px rgba(255,255,255,0.5);
    pointer-events: none;
  }

  /* Выход обратно в Сканер — новая рыбка */
  #exitBtn {
    position: fixed; top: 14px; right: 16px;
    color: rgba(200,240,255,0.85); font-size: 13px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: rgba(0,10,30,0.5); backdrop-filter: blur(8px);
    padding: 10px 16px; border-radius: 12px;
    border: 1px solid rgba(100,200,255,0.2);
    text-decoration: none; cursor: pointer;
  }
  #exitBtn:hover { background: rgba(0,10,30,0.75); border-color: rgba(100,200,255,0.4); }

  /* Переход обратно на Сканер (см. index.html — то же самое, но в другую
     сторону: "выезд" вниз/исчезновение перед навигацией, "въезд" сверху
     при загрузке). Только HUD/exitBtn/feedhint — canvas с рыбками не уезжает,
     это просто UI-обвязка поверх него. */
  body.leaving #hud, body.leaving #exitBtn, body.leaving #feedhint {
    animation: hudSlideDown 300ms ease-out forwards;
  }
  body.entering #hud, body.entering #exitBtn, body.entering #feedhint {
    animation: hudSlideInDown 350ms ease-out both;
  }
  @keyframes hudSlideDown {
    to { transform: translateY(32px); opacity: 0; }
  }
  @keyframes hudSlideInDown {
    from { transform: translateY(-32px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ?bg=1 — встраивается как фон Сканера через iframe (см. index.html).
     Сама анимация рыб/WS-подключение/приём новых рыбок работают как обычно —
     скрыт только UI поверх canvas, он тут не нужен и перекрывался бы карточками
     Сканера. body.bg-mode ставится в JS ниже до отрисовки первого кадра. */
  body.bg-mode #hud, body.bg-mode #exitBtn,
  body.bg-mode #feedhint, body.bg-mode #banner {
    display: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  🐠 <b>Fishing Vision</b> — аквариум<br>
  <span id="dot"></span><span id="status">подключаюсь…</span><br>
  рыбок: <b id="count">0</b>
</div>

<a id="exitBtn" href="/">← Новая рыбка</a>
<div id="banner"></div>
<div id="feedhint">🍎 клик — покормить рыбок</div>

<script>
// ?bg=1 — эта страница встроена как фоновый iframe на экране Сканера
// (см. index.html, #bg-aquarium). HUD/exitBtn/feedhint/banner там не нужны
// (см. CSS body.bg-mode выше) — сама Стена, WS-подключение, боиды и приём
// новых рыбок продолжают работать полностью как обычно.
if (new URLSearchParams(location.search).has('bg')) {
  document.body.classList.add('bg-mode');
}

// ═══════════════════════════════════════════════════════
//  ПЕРЕХОД НА/С СКАНЕРА (см. app.js: goToAquarium/playEnterAnimation —
//  тот же приём, зеркально: тут HUD/exitBtn/feedhint, а не header/.screen).
// ═══════════════════════════════════════════════════════
function playEnterAnimation() {
  document.body.classList.remove('entering');
  void document.body.offsetWidth;
  document.body.classList.add('entering');
}
playEnterAnimation();
window.addEventListener('pageshow', (e) => {
  if (e.persisted) playEnterAnimation();
});

document.getElementById('exitBtn').addEventListener('click', (e) => {
  e.preventDefault();
  const href = e.currentTarget.getAttribute('href');
  document.body.classList.add('leaving');
  setTimeout(() => { window.location.href = href; }, 300);
});

// ═══════════════════════════════════════════════════════
//  КОНФИГ
// ═══════════════════════════════════════════════════════
const CFG = {
  maxFish:        30,
  boidRadius:     120,   // радиус видимости соседей
  separateDist:   55,    // дистанция личного пространства
  cohesion:       0.0005,
  separation:     0.18,
  alignment:      0.005,
  boundary:       0.025,  // ↓ плавный разворот у стенок
  wander:         0.10,
  wanderChange:   0.008,  // ↓ медленный дрейф курса (было 0.03)
  minSpeed:       1.0,
  maxSpeed:       2.6,
  fishSize:       90,
  bubbleCount:    50,
  feedRadius:     999999, // ← все рыбки на экране идут к корму
  feedDuration:   5000,
  pollMs:         2500,
};

// ═══════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════════════════
//  ПУЗЫРЬКИ
// ═══════════════════════════════════════════════════════
const bubbles = Array.from({length: CFG.bubbleCount}, () => makeBubble());

function makeBubble(yOverride) {
  return {
    x:    Math.random() * W,
    y:    yOverride !== undefined ? yOverride : H + Math.random() * H,
    r:    1.5 + Math.random() * 4,
    vy:   0.35 + Math.random() * 0.9,
    sway: Math.random() * Math.PI * 2,
    swayAmp: 10 + Math.random() * 20,
    swaySpd: 0.01 + Math.random() * 0.02,
  };
}

function updateBubbles() {
  for (const b of bubbles) {
    b.y  -= b.vy;
    b.sway += b.swaySpd;
    b.x  += Math.sin(b.sway) * 0.4;
    if (b.y < -10) {
      Object.assign(b, makeBubble(H + 20));
      b.x = Math.random() * W;
    }
  }
}

function drawBubbles() {
  for (const b of bubbles) {
    const alpha = Math.min(1, (H - b.y) / 80) * 0.4;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(180,230,255,${alpha})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // блик
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
    ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════
//  КАУСТИКА (анимированные световые узоры)
// ═══════════════════════════════════════════════════════
let causticT = 0;

function drawCaustics() {
  causticT += 0.003;
  ctx.save();
  ctx.globalAlpha = 0.12;
  for (let i = 0; i < 8; i++) {
    const x = W * (0.1 + 0.1 * i) + Math.sin(causticT + i * 1.3) * 60;
    const y = -50 + Math.cos(causticT * 0.7 + i * 0.9) * 40;
    const grad = ctx.createLinearGradient(x, y, x + 30, H * 0.7);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + 15 + Math.sin(causticT + i) * 8, H * 0.7);
    ctx.lineTo(x + 30 + Math.cos(causticT + i * 0.5) * 8, H * 0.7);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  ДНО АКВАРИУМА
// ═══════════════════════════════════════════════════════
function drawFloor() {
  const floorY = H * 0.88;

  // Песок — светлый, солнечный, а не тёмная бездна
  const sandGrad = ctx.createLinearGradient(0, floorY, 0, H);
  sandGrad.addColorStop(0, '#f5dfa0');
  sandGrad.addColorStop(1, '#e0c374');
  ctx.fillStyle = sandGrad;
  ctx.fillRect(0, floorY, W, H - floorY);

  // Камушки
  ctx.save();
  const seed = 42;
  for (let i = 0; i < 40; i++) {
    const px = ((seed * 7 + i * 137) % W);
    const py = floorY + 4 + (i * 31) % 18;
    const rx = 4 + (i * 17) % 12;
    const ry = 3 + (i * 11) % 7;
    ctx.beginPath();
    ctx.ellipse(px, py, rx, ry, (i * 0.4), 0, Math.PI * 2);
    const l = 55 + (i * 13) % 20;
    ctx.fillStyle = `hsl(${30 + (i*23)%40},${25+(i*7)%25}%,${l}%)`;
    ctx.fill();
  }
  ctx.restore();

  // Домики — ананасовый и губчатый камень
  drawPineappleHouse(W * 0.28, floorY);
  drawSpongeHouse(W * 0.62, floorY);

  // Морская звезда на песке
  drawStarfish(W * 0.46, floorY - 8, 22, '#ff7f9c');

  // Водоросли — покачиваются сильнее, если рядом курсор/палец
  drawSeaweed(W * 0.05, floorY, 60, '#2fbf6e', 0);
  drawSeaweed(W * 0.18, floorY, 45, '#22a35c', 1.2);
  drawSeaweed(W * 0.82, floorY, 70, '#2fbf6e', 0.7);
  drawSeaweed(W * 0.92, floorY, 90, '#1c8f4c', 2.1);
  drawSeaweed(W * 0.5,  floorY, 40, '#3ad180', 3.5);

  // Кораллы
  drawCoral(W * 0.12, floorY, '#ff6b81');
  drawCoral(W * 0.85, floorY, '#ffa552');
  drawCoral(W * 0.72, floorY, '#ffd166');
}

// Ананасовый домик — мультяшный контур: чёрная обводка, круглое пузатое
// тело, ромбовидная сетка только внутри контура (clip), корона из
// заострённых листьев с собственной обводкой.
function drawPineappleHouse(x, baseY) {
  const w = 100, h = 118;
  ctx.save();
  ctx.translate(x, baseY);

  // тело — не идеальный овал, а слегка "пузатая книзу" мультяшная форма
  const bodyPath = new Path2D();
  bodyPath.moveTo(0, -h * 0.06);
  bodyPath.bezierCurveTo(-w * 0.56, -h * 0.02, -w * 0.52, -h * 0.62, -w * 0.30, -h * 0.80);
  bodyPath.bezierCurveTo(-w * 0.14, -h * 0.90, w * 0.14, -h * 0.90, w * 0.30, -h * 0.80);
  bodyPath.bezierCurveTo(w * 0.52, -h * 0.62, w * 0.56, -h * 0.02, 0, -h * 0.06);
  bodyPath.closePath();

  ctx.fillStyle = '#f5a623';
  ctx.fill(bodyPath);

  // ромбовидная текстура ананаса, обрезанная по силуэту тела
  ctx.save();
  ctx.clip(bodyPath);
  ctx.strokeStyle = 'rgba(150,80,10,0.55)';
  ctx.lineWidth = 2;
  for (let row = -1; row <= 8; row++) {
    ctx.beginPath();
    ctx.moveTo(-w * 0.6, -h * 0.86 + row * 13);
    ctx.lineTo(w * 0.6, -h * 0.86 + row * 13 + 11);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-w * 0.6, -h * 0.86 + row * 13 + 11);
    ctx.lineTo(w * 0.6, -h * 0.86 + row * 13);
    ctx.stroke();
  }
  // мягкий блик слева, как на мультяшных объектах
  ctx.fillStyle = 'rgba(255,240,200,0.28)';
  ctx.beginPath();
  ctx.ellipse(-w * 0.22, -h * 0.5, w * 0.14, h * 0.28, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // обводка тела
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#1a1a1a';
  ctx.stroke(bodyPath);

  // круглая дверь с рамкой
  ctx.fillStyle = '#4a2a10';
  ctx.beginPath(); ctx.arc(-w * 0.05, -h * 0.20, 15, 0, Math.PI * 2); ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#1a1a1a'; ctx.stroke();
  // окно-иллюминатор
  ctx.fillStyle = '#bdeeff';
  ctx.beginPath(); ctx.arc(w * 0.26, -h * 0.46, 10, 0, Math.PI * 2); ctx.fill();
  ctx.lineWidth = 3; ctx.stroke();

  // корона из листьев — треугольные, с обводкой, веером
  const leafCount = 5;
  for (let i = 0; i < leafCount; i++) {
    const t = i / (leafCount - 1);
    const dx = (t - 0.5) * w * 0.9;
    const tilt = (t - 0.5) * 0.8;
    const lh = 40 - Math.abs(t - 0.5) * 24;
    ctx.save();
    ctx.translate(dx, -h * 0.86);
    ctx.rotate(tilt);
    const leaf = new Path2D();
    leaf.moveTo(0, 4);
    leaf.quadraticCurveTo(9, -lh * 0.5, 0, -lh);
    leaf.quadraticCurveTo(-9, -lh * 0.5, 0, 4);
    ctx.fillStyle = '#2f9e4f';
    ctx.fill(leaf);
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#1a1a1a';
    ctx.stroke(leaf);
    ctx.restore();
  }
  ctx.restore();
}

// Домик-губка — неровный "жёваный" силуэт из скруглённых бугров (не
// идеальный овал), с мультяшной обводкой и порами разного размера.
function drawSpongeHouse(x, baseY) {
  const r = 48;
  ctx.save();
  ctx.translate(x, baseY - r * 0.68);

  // Точки соединяем плавными кривыми (через середины отрезков), а не прямыми
  // линиями — иначе получается гранёный многоугольник вместо мягкого бугра.
  const bumps = 12;
  const ring = [];
  for (let i = 0; i < bumps; i++) {
    const ang = (Math.PI * 2 * i) / bumps;
    const wobble = 1 + 0.16 * Math.sin(ang * 3 + 1.4) + 0.09 * Math.cos(ang * 5);
    ring.push([Math.cos(ang) * r * wobble, Math.sin(ang) * r * 0.82 * wobble]);
  }
  const path = new Path2D();
  const mid = (a, b) => [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
  const start = mid(ring[bumps - 1], ring[0]);
  path.moveTo(start[0], start[1]);
  for (let i = 0; i < bumps; i++) {
    const next = ring[(i + 1) % bumps];
    const m = mid(ring[i], next);
    path.quadraticCurveTo(ring[i][0], ring[i][1], m[0], m[1]);
  }
  path.closePath();

  ctx.fillStyle = '#f7d349';
  ctx.fill(path);
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#1a1a1a';
  ctx.stroke(path);

  // поры внутри силуэта
  ctx.save();
  ctx.clip(path);
  const holes = [[-20,-16,7],[12,-22,6],[22,4,8],[-10,16,6],[3,-4,5],[-26,8,5],[24,-8,4]];
  ctx.fillStyle = '#d9a916';
  for (const [hx, hy, hr] of holes) {
    ctx.beginPath();
    ctx.ellipse(hx, hy, hr, hr * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
  for (const [hx, hy, hr] of holes) {
    ctx.beginPath();
    ctx.ellipse(hx, hy, hr, hr * 0.85, 0, 0, Math.PI * 2);
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = 'rgba(26,26,26,0.5)';
    ctx.stroke();
  }

  // круглая дверь
  ctx.fillStyle = '#4a2a10';
  ctx.beginPath();
  ctx.arc(0, r * 0.5, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#1a1a1a';
  ctx.stroke();
  ctx.restore();
}

// Морская звезда — мультяшная обводка, мягко скруглённые лучи (не острые
// зубцы), лёгкие пятнышки текстуры.
function drawStarfish(x, y, r, color) {
  ctx.save();
  ctx.translate(x, y);
  const points = 5;
  const path = new Path2D();
  for (let i = 0; i <= points * 2; i++) {
    const ang = (Math.PI / points) * i - Math.PI / 2;
    const isTip = i % 2 === 0;
    const rad = isTip ? r : r * 0.46;
    // скругляем зубцы лёгким смещением второй контрольной точкой
    const px = Math.cos(ang) * rad;
    const py = Math.sin(ang) * rad * 0.8;
    if (i === 0) path.moveTo(px, py);
    else path.quadraticCurveTo(
      Math.cos(ang - Math.PI / points / 2) * rad * 0.9,
      Math.sin(ang - Math.PI / points / 2) * rad * 0.9 * 0.8,
      px, py
    );
  }
  path.closePath();

  ctx.fillStyle = color;
  ctx.fill(path);
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#1a1a1a';
  ctx.stroke(path);

  // пятнышки текстуры + блик
  ctx.fillStyle = 'rgba(200,40,90,0.35)';
  for (let i = 0; i < 5; i++) {
    const ang = (Math.PI * 2 / 5) * i - Math.PI / 2;
    ctx.beginPath();
    ctx.arc(Math.cos(ang) * r * 0.45, Math.sin(ang) * r * 0.36, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(-r * 0.18, -r * 0.16, r * 0.18, r * 0.1, -0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Курсор/палец рядом с водорослью — она сильнее раскачивается в ту сторону,
// как будто отзывается на течение от движения руки. Каждая "водоросль" —
// пучок из 3 широких изогнутых лент разной высоты (не одна тонкая линия),
// с обводкой и градиентной заливкой — похоже на настоящую морскую траву,
// а не на палку.
let weedT = 0;
let pointerX = -9999, pointerY = -9999;
function drawSeaweed(x, baseY, h, color, phase) {
  const dxp = 0, dyp = 0;
  const pdx = x - pointerX, pdy = (baseY - h * 0.5) - pointerY;
  const distToPointer = Math.sqrt(pdx * pdx + pdy * pdy);
  let extraPush = 0;
  if (distToPointer < 160) extraPush = (1 - distToPointer / 160) * 30;
  const pushDir = pdx > 0 ? 1 : -1;

  const blades = 3;
  for (let b = 0; b < blades; b++) {
    const bx = x + (b - 1) * 9;
    const bh = h * (0.75 + 0.25 * Math.abs(1 - b));
    const bw = 7 - b * 0.5;
    let sway = Math.sin(weedT + phase + b * 0.6) * (10 + b * 2);
    sway += pushDir * extraPush * (1 - b * 0.15);

    const tipX = bx + sway;
    const midX = bx + sway * 0.55;

    ctx.save();
    const grad = ctx.createLinearGradient(bx, baseY, bx, baseY - bh);
    grad.addColorStop(0, color);
    grad.addColorStop(1, '#eafce0');
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#0f5c30';
    ctx.lineWidth = 1.5;

    const blade = new Path2D();
    blade.moveTo(bx - bw, baseY);
    blade.quadraticCurveTo(bx - bw * 0.7, baseY - bh * 0.5, midX - bw * 0.35, baseY - bh * 0.72);
    blade.quadraticCurveTo(tipX - bw * 0.12, baseY - bh * 0.92, tipX, baseY - bh);
    blade.quadraticCurveTo(tipX + bw * 0.12, baseY - bh * 0.92, midX + bw * 0.35, baseY - bh * 0.72);
    blade.quadraticCurveTo(bx + bw * 0.7, baseY - bh * 0.5, bx + bw, baseY);
    blade.closePath();

    ctx.fill(blade);
    ctx.stroke(blade);
    ctx.restore();
  }
}

function drawCoral(x, y, color) {
  ctx.save();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 4.5;
  ctx.lineCap = 'round';
  const branches = [[0,-32],[11,-24],[-11,-24],[6,-48],[-6,-48]];
  for (const [dx,dy] of branches) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + dx, y + dy);
    ctx.stroke();
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  for (const [dx,dy] of branches) {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + dx, y + dy);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x + dx, y + dy, 5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#1a1a1a';
    ctx.stroke();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
//  РЫБКИ — heading-based движение
//  Каждая рыбка имеет heading (угол курса) и speed.
//  vx/vy всегда выводятся из heading — рыбка НИКОГДА
//  не плывёт задом: она поворачивается и плывёт вперёд.
// ═══════════════════════════════════════════════════════
const fishes = [];
const seen = new Set();

// Интерполяция углов по кратчайшему пути (-π..π)
function lerpAngle(a, b, t) {
  let diff = ((b - a + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
  return a + diff * t;
}

class Fish {
  constructor(img, name, id) {
    this.img  = img;
    this.name = name;
    this.id   = id;
    this.ready = false;
    this.size  = CFG.fishSize * (0.75 + Math.random() * 0.6);
    this.x     = Math.random() * W;
    this.y     = H * 0.15 + Math.random() * (H * 0.65);

    // Курс (угол) и скорость — вместо vx/vy напрямую
    this.heading = Math.random() * Math.PI * 2;
    this.speed   = CFG.minSpeed + Math.random() * (CFG.maxSpeed - CFG.minSpeed);
    // vx/vy нужны для Boids-расчётов соседей
    this.vx = Math.cos(this.heading) * this.speed;
    this.vy = Math.sin(this.heading) * this.speed;

    this.phase      = Math.random() * Math.PI * 2;
    this.nameAlpha  = 0;
    this.spawnScale = 0;
    this.attracted    = false;
    this.attractTarget = null;
    this.eating        = false;  // ест сейчас
    this.eatTimer      = 0;     // мс до окончания еды

    // Индивидуальные параметры блуждания (меньше = плавнее)
    this.wanderSpeed = 0.4 + Math.random() * 0.6;  // 0.4–1.0
    this.wanderBias  = (Math.random() - 0.5) * 0.004; // лёгкое личное предпочтение

    img.onload = () => { this.ready = true; };
    if (img.complete) this.ready = true;
  }

  update(dt) {
    if (this.spawnScale < 1)
      this.spawnScale = Math.min(1, this.spawnScale + dt * 0.002);

    if (this.eating) {
      // Рыбка ест — тормозит у еды
      this.eatTimer -= dt;
      this.speed = Math.max(0, this.speed * 0.90); // тормозит
      if (this.eatTimer <= 0) {
        this.eating       = false;
        this.attracted    = false;
        this.attractTarget = null;
        this.speed        = CFG.minSpeed;
      }
    } else if (this.attracted && this.attractTarget) {
      // Плывём к еде
      const dx   = this.attractTarget.x - this.x;
      const dy   = this.attractTarget.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 5) {
        const targetAngle = Math.atan2(dy, dx);
        this.heading = lerpAngle(this.heading, targetAngle, 0.25);
        this.speed   = Math.min(this.speed + 0.12, CFG.maxSpeed * 1.4);
      }
    } else {
      this.applyBoids();
    }

    if (!this.eating) {
      this.speed = Math.max(CFG.minSpeed, Math.min(CFG.maxSpeed, this.speed));
    }

    this.vx = Math.cos(this.heading) * this.speed;
    this.vy = Math.sin(this.heading) * this.speed;
    this.x += this.vx;
    this.y += this.vy;
    this.phase += this.eating ? 0.12 : 0.05; // быстрее покачивается пока ест

    const floorY = H * 0.88;
    if (this.y > floorY - this.size * 0.3)
      this.heading = lerpAngle(this.heading, -Math.PI / 2, 0.05);
    if (this.y < this.size * 0.3)
      this.heading = lerpAngle(this.heading,  Math.PI / 2, 0.05);

    if (this.x < -this.size) this.x = W + this.size;
    if (this.x > W + this.size) this.x = -this.size;
  }

  applyBoids() {
    let sx=0, sy=0, separateCount=0;
    let neighborCount=0, avgVx=0, avgVy=0;

    for (const other of fishes) {
      if (other === this) continue;
      const dx = other.x - this.x;
      const dy = other.y - this.y;
      const d  = Math.sqrt(dx*dx + dy*dy);

      if (d < CFG.boidRadius) {
        avgVx += other.vx; avgVy += other.vy;
        neighborCount++;
        if (d < CFG.separateDist && d > 0) {
          sx -= dx/d; sy -= dy/d;
          separateCount++;
        }
      }
    }

    // Слабое выравнивание курса с соседями
    if (neighborCount > 0) {
      const targetAngle = Math.atan2(avgVy / neighborCount, avgVx / neighborCount);
      this.heading = lerpAngle(this.heading, targetAngle, CFG.alignment);
    }

    // Разделение — повернуться прочь от толпы
    if (separateCount > 0) {
      const awayAngle = Math.atan2(sy, sx);
      this.heading = lerpAngle(this.heading, awayAngle, 0.04); // плавнее
      this.speed = Math.min(this.speed + 0.03, CFG.maxSpeed);
    }

    // Индивидуальное блуждание — heading дрейфует медленно
    this.heading += (Math.random() - 0.5) * CFG.wanderChange * this.wanderSpeed
                  + this.wanderBias;

    // Мягкое отталкивание от границ (плавный поворот)
    const margin = 100;
    if (this.x < margin)
      this.heading = lerpAngle(this.heading, 0, CFG.boundary * (1 - this.x / margin));
    if (this.x > W - margin)
      this.heading = lerpAngle(this.heading, Math.PI, CFG.boundary * (1 - (W - this.x) / margin));
  }

  // Позиция рта: передний край рыбки, чуть ниже центра.
  // Работает и для нарисованного спрайта, и для реальных фото.
  get mouthX() {
    const sign = Math.cos(this.heading) >= 0 ? 1 : -1;
    return this.x + sign * this.size * 0.36;
  }
  get mouthY() {
    return this.y + this.size * 0.06; // лёгкое смещение вниз, нейтральное
  }

  draw() {
    if (!this.ready) return;

    // Морда всегда смотрит в направлении heading
    const facingLeft = Math.cos(this.heading) < 0;
    const wobble = Math.sin(this.phase) * (this.eating ? 0.18 : 0.08);
    const s = this.spawnScale;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(wobble);
    ctx.scale(s * (facingLeft ? -1 : 1), s);

    // Тень под рыбой
    ctx.save();
    ctx.globalAlpha = 0.15;
    ctx.filter = 'blur(4px)';
    ctx.drawImage(this.img, -this.size/2, -this.size/4, this.size, this.size * 0.6);
    ctx.restore();

    // Сама рыба
    ctx.drawImage(this.img, -this.size/2, -this.size/2, this.size, this.size);

    ctx.restore();

    // Имя рыбки (над ней, без переворота)
    if (this.name && s > 0.8) {
      this.nameAlpha = Math.min(1, this.nameAlpha + 0.05);
      ctx.save();
      ctx.globalAlpha = this.nameAlpha * 0.8;
      ctx.font = '11px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffd166';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 4;
      ctx.fillText(this.name, this.x, this.y - this.size * 0.55);
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════
//  КОРМЛЕНИЕ
// ═══════════════════════════════════════════════════════
const foods = [];
let lastFoodTime = 0;

class Food {
  constructor(x, y) {
    this.x     = x;
    this.y     = y;
    this.vy    = 0.25;       // очень медленное падение
    this.life  = 12000;
    this.alpha = 1;
    this.phase = Math.random() * Math.PI * 2;
    this.eating = false;

    // Одна рыбка на один кусок еды
    this.assignedFish = this._pickFish();
    if (this.assignedFish) {
      this.assignedFish.attracted    = true;
      this.assignedFish.attractTarget = this;
    }
  }

  _pickFish() {
    let best = null, bestDist = Infinity;
    for (const f of fishes) {
      if (f.attracted || f.eating) continue;
      const d = Math.hypot(this.x - f.x, this.y - f.y);
      if (d < bestDist) { bestDist = d; best = f; }
    }
    return best;
  }

  update(dt) {
    this.life  -= dt;
    this.phase += 0.04;

    // Медленно падает на песок — НО замирает когда рыбка ест
    const sandY = H * 0.86;
    if (!this.eating && this.y < sandY) {
      this.y  += this.vy;
      this.vy  = Math.min(this.vy + 0.004, 0.9);
    } else if (!this.eating) {
      this.y  = sandY;
      this.vy = 0;
    }
    // если this.eating — Y не меняется, еда висит на месте

    if (!this.assignedFish) return;

    // Рыбка пропала?
    if (!fishes.includes(this.assignedFish)) {
      this.life = 0;
      return;
    }

    if (!this.eating) {
      // Рыбка доплыла ртом до еды?
      const mouthDist = Math.hypot(this.x - this.assignedFish.mouthX,
                                   this.y - this.assignedFish.mouthY);
      if (mouthDist < 42) {
        this.eating = true;
        this.assignedFish.eating       = true;
        this.assignedFish.eatTimer     = 2500;
        this.assignedFish.attracted    = false;
        this.assignedFish.attractTarget = null;
      }
    } else {
      // Еда плавно летит к рту рыбки (lerp)
      this.x += (this.assignedFish.mouthX - this.x) * 0.15;
      this.y += (this.assignedFish.mouthY - this.y) * 0.15;
      this.alpha = Math.max(0, this.alpha - dt / 2000);
      if (this.alpha <= 0 || !this.assignedFish.eating) {
        this.life = 0;
      }
    }
  }

  draw() {
    if (this.alpha <= 0) return;
    const pulse = 1 + 0.12 * Math.sin(this.phase);
    const r = 6 * pulse;
    ctx.globalAlpha = this.alpha * Math.min(1, this.life / 1500);
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd166';
    ctx.shadowColor = '#ff9f43';
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(this.x - 1.5, this.y - 1.5, r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,210,0.9)';
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  get dead() { return this.life <= 0; }
}

canvas.addEventListener('click', (e) => {
  const now = Date.now();
  if (now - lastFoodTime < 1500) return; // кулдаун 1.5с
  lastFoodTime = now;
  const rect = canvas.getBoundingClientRect();
  foods.push(new Food(e.clientX - rect.left, e.clientY - rect.top));
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const now = Date.now();
  if (now - lastFoodTime < 1500) return;
  lastFoodTime = now;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  foods.push(new Food(t.clientX - rect.left, t.clientY - rect.top));
}, {passive: false});

// Водоросли "чувствуют" курсор/палец рядом — раскачиваются сильнее (см. drawSeaweed)
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  pointerX = e.clientX - rect.left;
  pointerY = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', () => { pointerX = -9999; pointerY = -9999; });
canvas.addEventListener('touchmove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  pointerX = t.clientX - rect.left;
  pointerY = t.clientY - rect.top;
}, {passive: true});


// ═══════════════════════════════════════════════════════
//  ФОНОВЫЙ ГРАДИЕНТ
// ═══════════════════════════════════════════════════════
function drawBackground() {
  // Светлое весёлое "мультяшное" дно — солнечная вода, а не глубокая ночь.
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#7fe0f5');
  grad.addColorStop(0.45,'#4fc3e8');
  grad.addColorStop(0.8, '#2fa8d8');
  grad.addColorStop(1,   '#1e8fc4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ═══════════════════════════════════════════════════════
//  СТЕКЛЯННЫЕ КРАЯ АКВАРИУМА
// ═══════════════════════════════════════════════════════
function drawGlass() {
  // Верхняя поверхность воды
  const waterGrad = ctx.createLinearGradient(0, 0, 0, 30);
  waterGrad.addColorStop(0, 'rgba(100,200,255,0.25)');
  waterGrad.addColorStop(1, 'rgba(100,200,255,0)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, 0, W, 30);

  // Блики по бокам
  const leftGrad = ctx.createLinearGradient(0, 0, 20, 0);
  leftGrad.addColorStop(0, 'rgba(150,220,255,0.12)');
  leftGrad.addColorStop(1, 'rgba(150,220,255,0)');
  ctx.fillStyle = leftGrad;
  ctx.fillRect(0, 0, 20, H);

  const rightGrad = ctx.createLinearGradient(W, 0, W-20, 0);
  rightGrad.addColorStop(0, 'rgba(150,220,255,0.08)');
  rightGrad.addColorStop(1, 'rgba(150,220,255,0)');
  ctx.fillStyle = rightGrad;
  ctx.fillRect(W-20, 0, 20, H);
}

// ═══════════════════════════════════════════════════════
//  NETWORK — WebSocket + HTTP fallback
// ═══════════════════════════════════════════════════════
const WS_URL  = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws/wall';
const HTTP    = location.origin;
const dotEl   = document.getElementById('dot');
const statusEl= document.getElementById('status');
const countEl = document.getElementById('count');
const banner  = document.getElementById('banner');
let bannerTimer = null;

function setStatus(online, text) {
  dotEl.className = online ? 'on' : 'off';
  statusEl.textContent = text;
}

function showBanner(text) {
  banner.textContent = text;
  banner.classList.add('show');
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => banner.classList.remove('show'), 3500);
}

function addFish(meta) {
  if (seen.has(meta.fish_id)) return;
  seen.add(meta.fish_id);

  // Убрать старейшую если переполнение
  if (fishes.length >= CFG.maxFish) fishes.shift();

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = HTTP + meta.image_url;

  const name = meta.name || meta.fishType || 'рыбка';
  const fish = new Fish(img, name, meta.fish_id);
  fishes.push(fish);

  countEl.textContent = fishes.length;
  showBanner(`🐟 Новая рыбка: ${name}!`);
}

// WebSocket
let ws = null;
let reconnectFailCount = 0;
// После стольких неудачных попыток подряд (onclose без onopen между ними)
// включаем HTTP-поллинг как временную подстраховку, не дожидаясь, пока WS
// сдастся навсегда — сам WS-реконнект при этом продолжает пытаться в фоне.
// 3 попытки * 3с задержка = ~9с до включения подстраховки — не мгновенно
// (не дёргаемся на одиночный сетевой blip), но и не слишком долго для демо.
const HTTP_FALLBACK_AFTER = 3;

function connectWS() {
  try {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      reconnectFailCount = 0;
      stopHttpPoll(); // WS ожил — HTTP-дубль источника данных больше не нужен
      setStatus(true, 'подключено');
    };

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        // Контракт: неизвестные type нужно игнорировать, а не пытаться
        // угадать по наличию полей — иначе будущий тип события с полем
        // fish_id/image_url будет по ошибке принят за новую рыбку.
        if (data.type === 'new_fish' && (data.fish_id || data.image_url)) addFish(data);
      } catch {}
    };

    ws.onclose = () => {
      reconnectFailCount++;
      setStatus(false, 'переподключение…');
      if (reconnectFailCount >= HTTP_FALLBACK_AFTER) startHttpPoll();
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => {
      setStatus(false, 'ошибка WS');
      ws.close();
    };
  } catch {
    setStatus(false, 'WS недоступен');
    startHttpPoll();
  }
}

// HTTP fallback polling — подстраховка на случай, если WS реально не может
// подняться (не только синхронная ошибка конструктора, но и обрыв связи на
// демо: сервер упал, не тот Wi-Fi и т.п.). Работает ПАРАЛЛЕЛЬНО с попытками
// WS-реконнекта, а не вместо них — как только WS оживёт, останавливается.
let lastFishId = null;
let httpPollInterval = null;

function startHttpPoll() {
  if (httpPollInterval) return; // уже поллим, второй интервал не нужен
  httpPollInterval = setInterval(async () => {
    try {
      const r = await fetch(HTTP + '/api/fish/latest');
      if (!r.ok) return;
      const data = await r.json();
      if (data && data.fish_id && data.fish_id !== lastFishId) {
        lastFishId = data.fish_id;
        addFish(data);
        setStatus(true, 'HTTP polling');
      }
    } catch {
      setStatus(false, 'нет связи');
    }
  }, CFG.pollMs);
}

function stopHttpPoll() {
  if (httpPollInterval) {
    clearInterval(httpPollInterval);
    httpPollInterval = null;
  }
}

connectWS();

// ═══════════════════════════════════════════════════════
//  ГЛАВНЫЙ ИГРОВОЙ ЦИКЛ
// ═══════════════════════════════════════════════════════
let last = 0;
weedT = 0;

function loop(ts) {
  const dt = ts - last;
  last = ts;
  weedT += 0.02;

  // Фон
  drawBackground();
  drawCaustics();
  drawGlass();
  drawFloor();

  // Пузырьки (под рыбами)
  updateBubbles();
  drawBubbles();

  // Еда
  for (let i = foods.length - 1; i >= 0; i--) {
    foods[i].update(dt);
    foods[i].draw();
    if (foods[i].dead) {
      // Сбросить притяжение и таймер
      const food = foods[i];
      if (food._waitTimer) clearTimeout(food._waitTimer);
      for (const f of fishes) {
        if (f.attractTarget === food) {
          f.attracted = false;
          f.attractTarget = null;
        }
      }
      foods.splice(i, 1);
    }
  }

  // Рыбы
  for (const f of fishes) {
    f.update(dt);
    f.draw();
  }

  // Если рыб нет — показать подсказку
  if (fishes.length === 0) {
    ctx.save();
    ctx.font = '18px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(10,50,70,0.45)';
    ctx.fillText('Ожидаем рыбок от сканера…', W/2, H/2);
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════════
//  DEMO MODE — автоматические тестовые рыбки при загрузке
//  Нажми D на клавиатуре чтобы добавить ещё одну
// ═══════════════════════════════════════════════════════
const DEMO_NAMES  = ['Немо', 'Дори', 'Пузырь', 'Краб', 'Жемчуг', 'Марлин', 'Гуппи', 'Зефир'];
const DEMO_COLORS = [
  [0,   '#ff6b6b', '#ff9f43'],   // красный
  [180, '#54a0ff', '#5f27cd'],   // синий
  [120, '#1dd1a1', '#10ac84'],   // зелёный
  [45,  '#feca57', '#ff9f43'],   // жёлтый
  [300, '#ff9ff3', '#f368e0'],   // розовый
  [200, '#48dbfb', '#0abde3'],   // голубой
];

function makeDemoFish(nameOverride) {
  const id  = 'demo_' + Date.now() + '_' + Math.random();
  const tmp = document.createElement('canvas');
  tmp.width = tmp.height = 200;
  const tc  = tmp.getContext('2d');

  const [hue, col1, col2] = DEMO_COLORS[Math.floor(Math.random() * DEMO_COLORS.length)];

  // ── Рыбка нарисована ГОЛОВОЙ ВПРАВО (eye справа, хвост слева) ──
  // Это соответствует convention: без flip = смотрит вправо

  // Хвост — СЛЕВА
  const tailGrad = tc.createLinearGradient(0, 60, 55, 140);
  tailGrad.addColorStop(0, col2);
  tailGrad.addColorStop(1, col1);
  tc.fillStyle = tailGrad;
  tc.beginPath();
  tc.moveTo(52, 100);
  tc.lineTo(2, 62);
  tc.lineTo(2, 138);
  tc.closePath();
  tc.fill();

  // Тело — по центру
  const bodyGrad = tc.createRadialGradient(110, 95, 5, 110, 95, 70);
  bodyGrad.addColorStop(0, col2);
  bodyGrad.addColorStop(1, col1);
  tc.fillStyle = bodyGrad;
  tc.beginPath();
  tc.ellipse(108, 100, 68, 42, 0, 0, Math.PI * 2);
  tc.fill();

  // Полоски на теле
  tc.globalAlpha = 0.25;
  tc.fillStyle = '#fff';
  for (let s = 0; s < 3; s++) {
    tc.beginPath();
    tc.ellipse(80 + s*20, 100, 5, 35, 0, 0, Math.PI*2);
    tc.fill();
  }
  tc.globalAlpha = 1;

  // Плавники
  tc.fillStyle = col2;
  tc.globalAlpha = 0.7;
  tc.beginPath();
  tc.ellipse(108, 60, 18, 8, -0.5, 0, Math.PI*2);
  tc.fill();
  tc.beginPath();
  tc.ellipse(108, 140, 18, 8, 0.5, 0, Math.PI*2);
  tc.fill();
  tc.globalAlpha = 1;

  // Голова — СПРАВА (рот-нос)
  tc.fillStyle = col1;
  tc.beginPath();
  tc.ellipse(162, 100, 28, 36, 0, 0, Math.PI*2);
  tc.fill();

  // Глаз — СПРАВА
  tc.fillStyle = '#fff';
  tc.beginPath();
  tc.arc(158, 88, 12, 0, Math.PI*2);
  tc.fill();
  tc.fillStyle = '#1a1a2e';
  tc.beginPath();
  tc.arc(161, 88, 7, 0, Math.PI*2);
  tc.fill();
  // Блик в глазу
  tc.fillStyle = '#fff';
  tc.beginPath();
  tc.arc(164, 85, 3, 0, Math.PI*2);
  tc.fill();

  const img = new Image();
  img.src = tmp.toDataURL();
  const name = nameOverride || DEMO_NAMES[Math.floor(Math.random() * DEMO_NAMES.length)];
  const fish = new Fish(img, name, id);
  fish.ready = true;
  seen.add(id);
  fishes.push(fish);
  countEl.textContent = fishes.length;
  return fish;
}

// Клавиша D — добавить демо-рыбку вручную. На публичном демо аквариум должен
// стартовать пустым и наполняться только настоящими рыбками с WS/HTTP —
// поэтому демо-режим активен только с ?debug=1 в адресной строке, иначе
// нажатие D ничего не делает (не только автоспавна при загрузке больше нет,
// но и сама клавиша по умолчанию неактивна).
if (new URLSearchParams(location.search).has('debug')) {
  document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() !== 'd') return;
    makeDemoFish();
    showBanner('🐟 Новая демо рыбка (клавиша D)');
  });
}
</script>
