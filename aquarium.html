<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анимагия — Аквариум (демо «Стены»)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #04283e; font-family: -apple-system, 'Segoe UI', sans-serif; }
  #tank { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 12px; left: 12px; color: #cfeffff0; font-size: 13px;
    background: rgba(0,0,0,.28); padding: 8px 12px; border-radius: 10px; line-height: 1.5;
  }
  #hud b { color: #ffd166; }
  #dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #888; margin-right: 6px; vertical-align: middle; }
  #dot.on { background: #06d6a0; box-shadow: 0 0 8px #06d6a0; }
  #dot.off { background: #e63946; }
</style>
</head>
<body>
<canvas id="tank"></canvas>
<div id="hud">
  🐠 <b>Анимагия</b> — аквариум (демо «Стены»)<br>
  <span id="dot"></span><span id="status">подключаюсь…</span><br>
  рыбок в аквариуме: <b id="count">0</b>
</div>

<script>
const SERVER = location.hostname + ':3000';        // бэкенд
const WS_URL = 'ws://' + SERVER + '/ws/wall';
const HTTP   = 'http://' + SERVER;

const canvas = document.getElementById('tank');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener('resize', resize); resize();

// ---------- пузырьки ----------
const bubbles = Array.from({length: 40}, () => newBubble());
function newBubble() {
  return { x: Math.random()*W, y: H + Math.random()*H, r: 2+Math.random()*5, sp: 0.4+Math.random()*1.2, sway: Math.random()*Math.PI*2 };
}

// ---------- рыбки ----------
const fishes = [];        // {img, x, y, vx, baseY, phase, size, ready, id}
const seen = new Set();   // чтобы не добавлять одну рыбку дважды

function addFish(meta) {
  if (seen.has(meta.fish_id)) return;
  seen.add(meta.fish_id);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = HTTP + meta.image_url;
  const size = 110 + Math.random()*70;
  const dir = Math.random() < 0.5 ? -1 : 1;
  const f = {
    img, ready: false, id: meta.fish_id,
    x: Math.random()*W, baseY: 80 + Math.random()*(H-200),
    vx: dir * (0.6 + Math.random()*0.9),
    phase: Math.random()*Math.PI*2, size,
    spawn: performance.now()
  };
  img.onload = () => { f.ready = true; };
  fishes.push(f);
  document.getElementById('count').textContent = fishes.length;
}

// ---------- анимация ----------
function draw(t) {
  // вода — вертикальный градиент
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0b4f6c'); g.addColorStop(1, '#04283e');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  // лучи света
  ctx.save(); ctx.globalAlpha = 0.06; ctx.fillStyle = '#bfefff';
  for (let i=0;i<3;i++){ const x = (W*0.2)+(i*W*0.3)+Math.sin(t/4000+i)*40;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+120,0); ctx.lineTo(x+260,H); ctx.lineTo(x+40,H); ctx.closePath(); ctx.fill(); }
  ctx.restore();

  // пузырьки
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  for (const b of bubbles) {
    b.y -= b.sp; b.sway += 0.03; b.x += Math.sin(b.sway)*0.4;
    if (b.y < -10) Object.assign(b, newBubble());
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
  }

  // рыбки
  for (const f of fishes) {
    f.x += f.vx;
    const margin = f.size;
    if (f.x < -margin) f.x = W + margin;
    if (f.x > W + margin) f.x = -margin;
    const y = f.baseY + Math.sin(t/700 + f.phase) * 18;   // покачивание вверх-вниз

    if (!f.ready) continue;
    const grow = Math.min(1, (t - f.spawn) / 500);         // плавное появление
    const s = f.size * grow;
    ctx.save();
    ctx.translate(f.x, y);
    if (f.vx > 0) ctx.scale(-1, 1);   // рыбка нарисована мордой влево -> зеркалим когда плывёт вправо
    ctx.globalAlpha = grow;
    ctx.drawImage(f.img, -s/2, -s/2, s, s);
    ctx.restore();
  }

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---------- связь с бэкендом ----------
const dot = document.getElementById('dot');
const statusEl = document.getElementById('status');

function connect() {
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => { dot.className = 'on'; statusEl.textContent = 'подключено к серверу'; };
  ws.onmessage = (e) => {
    try { const m = JSON.parse(e.data); if (m.type === 'new_fish') addFish(m); } catch {}
  };
  ws.onclose = () => { dot.className = 'off'; statusEl.textContent = 'связь потеряна, переподключаюсь…'; setTimeout(connect, 1500); };
  ws.onerror = () => { ws.close(); };
}
connect();

// на всякий — если WebSocket недоступен, подтянем очередь разово
fetch(HTTP + '/api/fish/queue').then(r => r.json()).then(list => list.forEach(addFish)).catch(()=>{});
</script>
</body>
</html>
